# Раздача собранного SPA. Два разных правила кэширования — ключевая идея:
#
# - /assets/* — файлы от Vite с хэшем в имени (index-K3if-NYd.js). Хэш меняется
#   при любой правке содержимого, значит старое имя = старое содержимое навсегда.
#   Можно кэшировать "вечно" (immutable) — новый деплой придёт под новым именем.
# - всё остальное (в первую очередь index.html) — НЕ кэшируем: это единственный
#   файл, который при деплое меняется, оставаясь под тем же именем. Закэшируй его
#   браузер — пользователь не увидит новую версию, пока сам не сбросит кэш.

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA-fallback: любой путь, для которого нет файла на диске (например,
    # /dashboard — это не файл, а маршрут react-router), отдаём index.html,
    # а дальше JS в браузере сам разбирает URL и рисует нужную страницу.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri /index.html;
    }
}
