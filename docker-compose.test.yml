# Тестовая БД — отдельный контейнер на порту 5433.
# tmpfs: данные хранятся в RAM → быстро, но пропадают при остановке (для тестов — ОК).
# Запуск: docker compose -f docker-compose.test.yml up -d

services:
  test-db:
    image: postgres:17
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: link_shortener_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
