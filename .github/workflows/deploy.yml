# Deploy — конвейер доставки: запускается на push в main (т.е. после merge PR).
#
# Цепочка: test → build-and-push (→ deploy добавится в PR 3).
# Тесты здесь ПОВТОРЯЮТСЯ, хотя PR-гейт (ci.yml) их уже гонял. Зачем:
# merge-race — два по отдельности зелёных PR могут вместе сломать main;
# плюс страховка на случай, если что-то попало в main мимо PR.
# Сломанный main не должен превратиться в образ и уехать на сервер.

name: Deploy

on:
  push:
    branches: [main]
  # Ручная кнопка «передеплоить» на вкладке Actions — на случай, если
  # деплой флакнул и нужно повторить без нового коммита.
  workflow_dispatch:

# Деплои НЕ отменяем (в отличие от CI): убить деплой посреди `up -d` —
# получить полуобновлённый прод. Второй запуск просто ждёт в очереди.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  # Копия test-джобы из ci.yml. Дублирование осознанное: на два файла
  # это дешевле, чем reusable workflow (workflow_call) — известный
  # рефакторинг, если джобы начнут расползаться.
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: link_shortener_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen --group test
      - run: uv run pytest --cov=app

  build-and-push:
    needs: test # сломанный main не должен породить образ
    runs-on: ubuntu-latest

    # GITHUB_TOKEN по умолчанию read-only; для пуша пакета в GHCR
    # этому job'у нужно явно выдать право packages: write.
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # buildx — расширенный сборщик Docker; нужен для внешнего кэша слоёв.
      - uses: docker/setup-buildx-action@v3

      # Логин в GHCR через GITHUB_TOKEN — автоматический токен на один
      # запуск workflow, привязан к этому репо и умирает вместе с job'ом.
      # Никаких личных PAT и ручных секретов.
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Два тега:
      #   latest      — «текущий прод», его тянет сервер при деплое;
      #   <commit SHA> — неизменяемый снимок: аудит («что крутится на проде?»)
      #                  и мгновенный откат на любую прошлую версию.
      # Кэш слоёв (type=gha) живёт в кэше GitHub Actions: неизменившиеся
      # слои (например, uv sync с тем же uv.lock) не пересобираются.
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/gigitog/link-shortener:latest
            ghcr.io/gigitog/link-shortener:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Параллельно build-and-push: свой контекст сборки (frontend/), свой образ,
  # свой тег кэша — джобы не мешают друг другу и идут на разных раннерах.
  build-and-push-frontend:
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ${GITHUB_SHA::7} — bash-срез, GitHub Actions expressions такое не умеют,
      # поэтому короткий SHA считаем отдельным шагом и читаем через outputs.
      # Он же попадёт в футер фронтенда (VITE_APP_VERSION) — версия единая
      # на весь сервис, а не отдельно для backend/frontend.
      - name: Короткий SHA коммита
        id: vars
        run: echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_APP_VERSION=${{ steps.vars.outputs.sha_short }}
          tags: |
            ghcr.io/gigitog/link-shortener-frontend:latest
            ghcr.io/gigitog/link-shortener-frontend:${{ github.sha }}
          # scope=frontend — иначе кэш этого образа делил бы GitHub Actions
          # cache-ключи с кэшем backend-образа выше и постоянно бы его вытеснял.
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    # Деплоим только если ОБА образа успешно собрались и запушились.
    needs: [build-and-push, build-and-push-frontend]
    runs-on: ubuntu-latest
    steps:
      # Раскладываем приватный ключ и известный host key из секретов на раннер.
      # Раннер одноразовый — после job'а всё это уничтожается вместе с VM.
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      # Заходим на сервер и обновляем прод. Всё внутри heredoc выполняется
      # НА СЕРВЕРЕ. set -e: любая упавшая команда обрывает деплой, а не идёт
      # дальше «как будто всё хорошо».
      - name: Deploy
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            cd ~/link-shortener
            # Забираем свежие compose-файлы/Caddyfile из репо. --ff-only падает,
            # если на сервере руками правили файлы (тогда деплой лучше остановить).
            git pull --ff-only
            # Тянем новые образы app и frontend из GHCR (публичные — без docker login).
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull app frontend
            # Пересоздаём только app и frontend (образы сменились); db и caddy не трогаем.
            # Без --build: сервер больше ничего не собирает. Миграции — в entrypoint.
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            # git pull обновил примонтированный Caddyfile, но caddy не пересоздавался
            # (его образ не менялся) — сам файл он не перечитывает, нужен явный reload.
            docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T caddy \
              caddy reload --config /etc/caddy/Caddyfile
            # Чистим повисшие старые слои, чтобы диск не забивался при каждом деплое.
            docker image prune -f
          EOF
