# Конфиг Prometheus: куда и как часто ходить за метриками.
#
# scrape_interval — раз в сколько Prometheus сам приходит забрать снимок
# с /metrics (pull-модель — см. app/main.py и DECISIONS.md). 15 секунд —
# стандартный дефолт самого Prometheus, для пет-проекта с невысоким
# трафиком чаще не нужно: данные между опросами всё равно не поменяются
# драматично, а более частый опрос — это просто лишняя нагрузка и больше
# данных на диске без дополнительной пользы.
global:
  scrape_interval: 15s

scrape_configs:
  # job_name — просто ярлык, под которым эта группа целей видна в Prometheus
  # и доступна в PromQL как метка `job="link-shortener-app"`.
  - job_name: link-shortener-app
    static_configs:
      # "app" — имя сервиса в docker-compose, не IP: DNS внутри сети compose
      # сам резолвит его в адрес контейнера. Порт 8000 — тот же, на котором
      # слушает uvicorn; наружу (через Caddy/домен) этот путь не проксируется,
      # Prometheus обращается к app напрямую, оставаясь внутри docker-сети.
      - targets: ["app:8000"]
